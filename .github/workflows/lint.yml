name: Lint

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - actionlint
          - checkbashisms
          - shfmt
          - codespell
          - shellcheck
    steps:
      - uses: actions/checkout@v5
      - name: Run lint target
        shell: bash
        env:
          ZXFER_LINT_TOOL_DIR: ${{ runner.temp }}/zxfer-lint-tools
        run: |
          set -euo pipefail
          ./tests/run_lint.sh "${{ matrix.target }}"
