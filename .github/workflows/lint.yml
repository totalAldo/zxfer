name: Lint

on:
  push:

concurrency:
  # Cancel superseded runs for the same pushed ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target:
          - actionlint
          - checkbashisms
          - shfmt
          - codespell
          - shellcheck
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run lint target
        shell: bash
        env:
          ZXFER_LINT_TOOL_DIR: ${{ runner.temp }}/zxfer-lint-tools
        run: |
          set -euo pipefail
          ./tests/run_lint.sh "${{ matrix.target }}"
