name: Integration Tests

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zfs-integration:
    name: ZFS Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install ZFS prerequisites
        shell: bash
        run: |
          set -euo pipefail
          export PATH="/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          sudo apt-get update
          sudo apt-get install -y csh zfsutils-linux
          sudo modprobe zfs
          sudo zfs version
          sudo zpool version

      - name: Run integration tests
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}/zxfer-integration-tmp
          ZXFER_PRESERVE_WORKDIR_ON_FAILURE: 1
        run: |
          set -euo pipefail
          export PATH="/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          mkdir -p "$TMPDIR"
          sudo env "PATH=$PATH" "TMPDIR=$TMPDIR" \
            "ZXFER_PRESERVE_WORKDIR_ON_FAILURE=$ZXFER_PRESERVE_WORKDIR_ON_FAILURE" \
            ./tests/run_integration_zxfer.sh --yes --keep-going

      - name: Prepare integration artifacts
        if: failure()
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}/zxfer-integration-tmp
        run: |
          set -euo pipefail
          if [ -e "$TMPDIR" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$TMPDIR"
          fi

      - name: Upload integration artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: zxfer-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/zxfer-integration-tmp
          if-no-files-found: warn
