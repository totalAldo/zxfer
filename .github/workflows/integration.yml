name: Integration Tests

on:
  push:

concurrency:
  # Cancel superseded runs for the same pushed ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zfs-integration:
    name: ZFS Integration
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install ZFS prerequisites
        shell: bash
        run: |
          set -euo pipefail
          export PATH="/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          sudo apt-get update
          sudo apt-get install -y csh zfsutils-linux
          sudo modprobe zfs
          sudo zfs version
          sudo zpool version

      - name: Run integration tests
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}/zxfer-integration-tmp
          ZXFER_PRESERVE_WORKDIR_ON_FAILURE: 1
        run: |
          set -euo pipefail
          export PATH="/usr/sbin:/usr/bin:/sbin:/bin:$PATH"
          mkdir -p "$TMPDIR"
          sudo env "PATH=$PATH" "TMPDIR=$TMPDIR" \
            "ZXFER_PRESERVE_WORKDIR_ON_FAILURE=$ZXFER_PRESERVE_WORKDIR_ON_FAILURE" \
            ./tests/run_integration_zxfer.sh --yes --keep-going

      - name: Prepare integration artifacts
        if: failure()
        shell: bash
        env:
          TMPDIR: ${{ runner.temp }}/zxfer-integration-tmp
        run: |
          set -euo pipefail
          if [ -e "$TMPDIR" ]; then
            sudo chown -R "$(id -u):$(id -g)" "$TMPDIR"
          fi

      - name: Upload integration artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zxfer-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/zxfer-integration-tmp
          if-no-files-found: warn

  integration-freebsd:
    name: ZFS Integration (FreeBSD)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run integration tests on FreeBSD
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1.4.5
        with:
          usesh: true
          run: |
            export TMPDIR="$GITHUB_WORKSPACE/ci-artifacts/integration-freebsd"
            export ZXFER_PRESERVE_WORKDIR_ON_FAILURE=1
            export ZXFER_CI_GUEST_PREPARE='sh ./tests/ci/prepare_freebsd_vmactions_integration.sh'
            sh ./tests/ci/run_vmactions_integration.sh /bin/sh
      - name: Check FreeBSD integration status
        shell: bash
        run: |
          set -euo pipefail
          sh ./tests/ci/check_vmactions_integration_status.sh \
            "${{ github.workspace }}/ci-artifacts/integration-freebsd" \
            FreeBSD
      - name: Upload FreeBSD integration artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zxfer-integration-freebsd-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ci-artifacts/integration-freebsd
          if-no-files-found: warn

  integration-omnios:
    name: ZFS Integration (OmniOS)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run integration tests on OmniOS
        uses: vmactions/omnios-vm@68da93c6d9812b29fc90c5b5141b093f84a590fb # v1
        with:
          usesh: true
          run: |
            export TMPDIR="$GITHUB_WORKSPACE/ci-artifacts/integration-omnios"
            export ZXFER_PRESERVE_WORKDIR_ON_FAILURE=1
            export ZXFER_CI_GUEST_PREPARE='
            PKG_SUCCESS_ON_NOP=1 pkg install zstd
            '
            /usr/xpg4/bin/sh ./tests/ci/run_vmactions_integration.sh /usr/xpg4/bin/sh
      - name: Check OmniOS integration status
        shell: bash
        run: |
          set -euo pipefail
          sh ./tests/ci/check_vmactions_integration_status.sh \
            "${{ github.workspace }}/ci-artifacts/integration-omnios" \
            OmniOS
      - name: Upload OmniOS integration artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: zxfer-integration-omnios-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/ci-artifacts/integration-omnios
          if-no-files-found: warn
