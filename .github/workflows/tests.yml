# The shunit2 tests are low resource tests, so we can run them all in high parallel counts even on the slower shells
# --jobs 30 is selected to exceed the actual number of test files to ensure that all tests are run in parallel as much as possible.
# The test runner will automatically scale down the parallelism if there are fewer test files than the specified job count.
name: Unit Tests

on:
  push:

concurrency:
  # Cancel superseded runs for the same pushed ref.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shunit2:
    name: shunit2 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run shunit2 tests
        shell: bash
        run: |
          set -euo pipefail
          # This unit matrix intentionally does not install ZFS on macOS.
          # The shunit2 suites are used here as a /bin/sh and BSD-userland
          # portability gate without requiring a live ZFS stack.
          ./tests/run_shunit_tests.sh --jobs 30

  portable-shells:
    name: shunit2 (${{ matrix.shell_name }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shell_name: dash
            shell_kind: dash
          - shell_name: bash --posix
            shell_kind: bash-posix
          - shell_name: busybox ash
            shell_kind: busybox-ash
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install portable shells
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y busybox posh
      - name: Resolve shell under test
        id: shell_under_test
        shell: bash
        run: |
          set -euo pipefail
          wrapper_dir="$RUNNER_TEMP/zxfer-test-shells"
          mkdir -p "$wrapper_dir"
          case "${{ matrix.shell_kind }}" in
            dash)
              shell_under_test="$(command -v dash)"
              ;;
            bash-posix)
              bash_bin="$(command -v bash)"
              shell_under_test="$wrapper_dir/bash-posix"
              printf '%s\n' '#!/bin/sh' \
                "exec \"$bash_bin\" --posix \"\$@\"" >"$shell_under_test"
              chmod 755 "$shell_under_test"
              ;;
            busybox-ash)
              busybox_bin="$(command -v busybox)"
              shell_under_test="$wrapper_dir/busybox-ash"
              printf '%s\n' '#!/bin/sh' \
                "exec \"$busybox_bin\" ash \"\$@\"" >"$shell_under_test"
              chmod 755 "$shell_under_test"
              ;;
            posh)
              shell_under_test="$(command -v posh)"
              ;;
            *)
              echo "Unknown shell kind: ${{ matrix.shell_kind }}" >&2
              exit 1
              ;;
          esac
          printf 'shell_under_test=%s\n' "$shell_under_test" >>"$GITHUB_OUTPUT"
          printf 'Using shell under test: %s\n' "$shell_under_test"
      - name: Run shunit2 tests under selected shell
        shell: bash
        env:
          ZXFER_TEST_SHELL: ${{ steps.shell_under_test.outputs.shell_under_test }}
        run: |
          set -euo pipefail
          ./tests/run_shunit_tests.sh --jobs 30

  portable-shell-posh:
    name: shunit2 (posh)
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install posh
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y posh
      - name: Run shunit2 tests under posh
        shell: bash
        env:
          ZXFER_TEST_SHELL: /usr/bin/posh
        run: |
          set -euo pipefail
          ./tests/run_shunit_tests.sh --jobs 30

  shunit2-freebsd:
    name: shunit2 (FreeBSD)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run shunit2 tests on FreeBSD
        uses: vmactions/freebsd-vm@7ca82f79fe3078fecded6d3a2bff094995447bbd # v1
        with:
          usesh: true
          run: |
            ./tests/run_shunit_tests.sh --jobs 30

  shunit2-omnios:
    name: shunit2 (OmniOS)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run shunit2 tests on OmniOS
        uses: vmactions/omnios-vm@68da93c6d9812b29fc90c5b5141b093f84a590fb # v1
        with:
          usesh: true
          prepare: |
            PKG_SUCCESS_ON_NOP=1 pkg install bash
          run: |
            bash_bin=$(command -v bash)
            wrapper=$(mktemp /tmp/zxfer-bash-posix.XXXXXX)
            printf '%s\n' '#!/bin/sh' "exec \"$bash_bin\" --posix \"\$@\"" >"$wrapper"
            chmod 755 "$wrapper"
            export ZXFER_TEST_SHELL="$wrapper"
            # OmniOS /usr/xpg4/bin/sh follows ksh-style subshell function-binding
            # semantics and does not honor the subshell helper overrides used by
            # the shunit suites. Keep OmniOS runtime coverage in the integration
            # job, but run the unit suites through a POSIX bash wrapper here so
            # the tests exercise zxfer logic rather than shell-specific stubbing
            # behavior.
            "$bash_bin" ./tests/run_shunit_tests.sh --jobs 30
